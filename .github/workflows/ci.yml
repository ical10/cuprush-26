name: CI

on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  checks:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Enable corepack (pnpm via packageManager)
        run: corepack enable

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Lint
        run: pnpm lint

      - name: Typecheck
        run: pnpm typecheck

      - name: Unit tests
        run: pnpm test

      - name: Web tests
        run: npx vitest run --project web

      - name: Build
        run: pnpm build

  integration:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: worldcup_hilo
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      DATABASE_URL: postgresql://postgres:postgres@localhost:5432/worldcup_hilo
      # Auth defaults to privy (fail-closed) and throws without credentials;
      # integration tests that build the app from env need the dev stub.
      AUTH_MODE: dev
      # The integration global setup shells out to dropdb/createdb, which
      # read the PG* vars to reach the service container.
      PGHOST: localhost
      PGPORT: "5432"
      PGUSER: postgres
      PGPASSWORD: postgres
    steps:
      - uses: actions/checkout@v4

      - name: Enable corepack (pnpm via packageManager)
        run: corepack enable

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      # pnpm test:integration wraps vitest in `node --env-file=.env`, which
      # fails without a .env file; invoke vitest directly instead.
      - name: Integration tests
        run: node node_modules/vitest/vitest.mjs run --project integration

      # Boots the actual production entrypoint (`tsx src/api/server.ts`)
      # under Node's real ESM loader. Lint/typecheck/unit/web/build never
      # execute this path — vitest and tsx's esbuild-based CJS/ESM interop
      # is more permissive than Node's native loader, so a bad named import
      # from a CJS dependency (e.g. @coral-xyz/anchor's BN) can pass every
      # other check and still crash on boot. src/chain/index.ts imports
      # solana.ts unconditionally, so this needs no chain credentials —
      # only DATABASE_URL and the dev auth stub.
      - name: Boot smoke test
        env:
          PORT: "3100"
          NODE_ENV: test
          TXLINE_MODE: replay
        run: |
          pnpm exec tsx src/db/migrate.ts
          pnpm exec tsx src/api/server.ts &
          server_pid=$!
          trap 'kill $server_pid 2>/dev/null' EXIT
          for i in $(seq 1 30); do
            if curl -sf http://localhost:3100/api/health > /dev/null; then
              echo "Server booted and responded healthy."
              exit 0
            fi
            if ! kill -0 $server_pid 2>/dev/null; then
              echo "Server process exited before becoming healthy."
              exit 1
            fi
            sleep 1
          done
          echo "Server did not become healthy within 30s."
          exit 1
